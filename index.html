<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TecHome</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="header-content">
        <div class="logo">
          <div class="logo-icon">TH</div>
          <span class="logo-text">TecHome</span>
        </div>
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Məhsul axtarın...">
          <button id="searchBtn" class="search-btn">Axtar</button>
        </div>
        <div class="header-actions">
          <button class="icon-btn" id="notificationBtn"><i class="fas fa-bell"></i></button>
          <button class="icon-btn" id="favoritesBtn">
            <i class="fas fa-heart"></i>
            <span class="badge" id="favoritesCount">0</span>
          </button>
          <button class="icon-btn" id="cartBtn">
            <i class="fas fa-shopping-cart"></i>
            <span class="badge" id="cartCount">0</span>
          </button>
          <button class="sell-btn">İndi Sat</button>
        </div>
      </div>
      <div class="categories">
        <button class="category-btn active" data-category="all">Hamısı</button>
        <button class="category-btn" data-category="smartphones">Smartfonlar</button>
        <button class="category-btn" data-category="notebooks">Notebooklar</button>
        <button class="category-btn" data-category="tablets">Planşetlər</button>
        <button class="category-btn" data-category="audio">Audio</button>
        <button class="category-btn" data-category="accessories">Aksesuarlar</button>
        <button class="category-btn" data-category="watches">Saatlar</button>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div class="container">
      <div id="productsSection" class="section active">
        <div class="products-count" id="productsCount">0 məhsul</div>
        <div id="productsContainer" class="products-grid"></div>
      </div>

      <div id="favoritesSection" class="section">
        <button class="back-btn" id="backToProducts"><i class="fas fa-arrow-left"></i> Geri</button>
        <h2 class="section-title">Bəyəndiklərim</h2>
        <div class="products-count" id="favoritesCountText">0 məhsul</div>
        <div id="favoritesGrid" class="products-grid"></div>
      </div>

      <div id="cartSection" class="section">
        <button class="back-btn" id="backToProductsCart"><i class="fas fa-arrow-left"></i> Geri</button>
        <h2 class="section-title">Səbət</h2>
        <div class="cart-content">
          <div class="cart-items" id="cartItems"></div>
          <div class="cart-summary">
            <h3>Sifariş</h3>
            <div class="summary-row"><span>Say:</span><span id="cartItemCount">0</span></div>
            <div class="summary-row"><span>Məbləğ:</span><span id="cartTotalAmount">0₼</span></div>
            <div class="summary-row total"><span>Cəmi:</span><span id="cartTotal">0₼</span></div>
            <button class="checkout-btn">Sifarişi tamamla</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="modal" id="productModal">
    <div class="modal-content">
      <div class="modal-body">
        <div class="modal-images">
          <div class="main-image"><img id="modalImage" src="" alt=""></div>
          <div class="thumbnail-images" id="thumbnailImages"></div>
        </div>
        <div class="modal-info">
          <div class="modal-header">
            <h2 id="modalTitle"></h2>
            <div class="modal-actions">
              <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
              <button class="favorite-btn" id="modalFavoriteBtn"><i class="far fa-heart"></i></button>
            </div>
          </div>
          <div class="modal-rating">
            <span class="stars" id="modalStars"></span>
            <span id="modalRatingCount"></span>
            <span id="modalLocation"></span>
          </div>
          <div class="modal-price">
            <span class="current-price" id="modalPrice"></span>
            <span class="old-price" id="modalOldPrice"></span>
            <span class="discount" id="modalDiscount"></span>
          </div>
          <div class="modal-description">
            <h3>Məhsul haqqında</h3>
            <p id="modalDescription"></p>
          </div>
          <div class="modal-details">
            <div class="detail-row"><span>Brend</span><strong id="modalBrand"></strong></div>
            <div class="detail-row"><span>Kateqoriya</span><strong id="modalCategory"></strong></div>
            <div class="detail-row"><span>Stok</span><strong id="modalStock"></strong></div>
          </div>
          <button class="add-to-cart-btn" id="addToCartBtn">Səbətə əlavə et</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">
    <i class="fas fa-check-circle"></i>
    <span id="toastMessage"></span>
  </div>

    

  <script src="app.js"></script>
</body>
</html>
